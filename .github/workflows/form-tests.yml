# Hourly recovery poll. The engine atomically claims the latest due Eastern
# two-hour slot (00/02/…/22 ET), so delayed cron runs cannot skip or duplicate it.

name: Form tests

on:
  schedule:
    - cron: "11 * * * *"
  workflow_dispatch:

concurrency:
  group: form-tests
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  form-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: engine/package-lock.json

      - name: Install npm packages
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('engine/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright OS deps (when browsers were cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: Validate production configuration
        env:
          PRECHECK_KIND: form
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_NAME: ${{ secrets.TEST_NAME }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PHONE: ${{ secrets.TEST_PHONE }}
          FORM_INBOX_VERIFICATION: ${{ secrets.FORM_INBOX_VERIFICATION }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
        run: npm run preflight

      - name: Run form tests
        env:
          DEPLOYMENT_MODE: production
          FORCE_PRODUCTION: "true"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_NAME: ${{ secrets.TEST_NAME }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PHONE: ${{ secrets.TEST_PHONE }}
          FORM_INBOX_VERIFICATION: ${{ secrets.FORM_INBOX_VERIFICATION }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npm run form:once
          else
            npm run form:slot
          fi
