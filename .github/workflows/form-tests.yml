# Quote form tests — 4× per day at 00:00, 06:00, 12:00, 18:00 US Eastern.
# GitHub cron is UTC, so we schedule both EST and EDT hours and gate on Eastern time.

name: Form tests

on:
  schedule:
    # Covers Eastern form slots in both EST (UTC-5) and EDT (UTC-4)
    - cron: '5 4,5,10,11,16,17,22,23 * * *'
  workflow_dispatch:

concurrency:
  group: form-tests
  cancel-in-progress: false

jobs:
  form-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Only run at Eastern form slots
        id: gate
        shell: bash
        run: |
          HOUR=$(TZ=America/New_York date +%H)
          case "$HOUR" in
            00|06|12|18)
              echo "due=true" >> "$GITHUB_OUTPUT"
              echo "Eastern hour is $HOUR — form tests will run."
              ;;
            *)
              echo "due=false" >> "$GITHUB_OUTPUT"
              echo "Eastern hour is $HOUR — not a form slot. Skipping."
              ;;
          esac

      - name: Setup Node.js
        if: steps.gate.outputs.due == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: engine/package-lock.json

      - name: Install npm packages
        if: steps.gate.outputs.due == 'true' || github.event_name == 'workflow_dispatch'
        run: npm ci

      - name: Cache Playwright browsers
        if: steps.gate.outputs.due == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('engine/package-lock.json') }}

      - name: Install Playwright browsers
        if: (steps.gate.outputs.due == 'true' || github.event_name == 'workflow_dispatch') && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright OS deps (when browsers were cached)
        if: (steps.gate.outputs.due == 'true' || github.event_name == 'workflow_dispatch') && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: Run form tests
        if: steps.gate.outputs.due == 'true' || github.event_name == 'workflow_dispatch'
        env:
          DEPLOYMENT_MODE: production
          FORCE_PRODUCTION: 'true'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_NAME: ${{ secrets.TEST_NAME }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PHONE: ${{ secrets.TEST_PHONE }}
          FORM_INBOX_VERIFICATION: ${{ secrets.FORM_INBOX_VERIFICATION }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: npm run form:once
