name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            engine/package-lock.json
            dashboard/package-lock.json

      - name: Install engine
        working-directory: engine
        run: npm ci

      - name: Typecheck engine
        working-directory: engine
        run: npm run build

      - name: Test engine outcomes
        working-directory: engine
        run: npm test

      - name: Install dashboard
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Lint dashboard
        working-directory: dashboard
        run: npm run lint

      - name: Test dashboard health rules
        working-directory: dashboard
        run: npm test

      - name: Verify migrations are versioned
        run: test -f supabase/migrations/005_current_data_integrity.sql
