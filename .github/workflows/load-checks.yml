# Load + render checks — every 30 minutes, one rotating profile
# (desktop → Safari → mobile) to cut proxy bandwidth.

name: Load checks

# Triggers: GitHub schedule (often delayed) + manual Run workflow.
on:
  schedule:
    # Twice hourly: each run covers one device profile for the current 30m Eastern slot.
    - cron: "17,47 * * * *"
  workflow_dispatch:
    inputs:
      complete_all_checks:
        description: Run every site/profile even after rate limits (one-off; scheduled runs still abort early)
        type: boolean
        default: false
      all_profiles:
        description: Run desktop + Safari + mobile in one job (bandwidth-heavy; default is one rotating profile)
        type: boolean
        default: false

concurrency:
  group: load-checks
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  load-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: engine/package-lock.json

      - name: Install npm packages
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('engine/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright OS deps (when browsers were cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: Keepalive ping
        # Touching the GitHub API counts as repo activity so scheduled
        # workflows are less likely to be disabled after 60 quiet days.
        run: |
          curl -sS -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}" > /dev/null
          echo "Keepalive OK at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Validate production configuration
        env:
          PRECHECK_KIND: load
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run preflight

      - name: Run load checks
        env:
          DEPLOYMENT_MODE: production
          FORCE_PRODUCTION: "true"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_NAME: ${{ secrets.TEST_NAME }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PHONE: ${{ secrets.TEST_PHONE }}
          FORM_INBOX_VERIFICATION: ${{ secrets.FORM_INBOX_VERIFICATION }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
          # Leave PROXY_URL secret empty (or unset) to go direct from the runner
          PROXY_URL: ${{ secrets.PROXY_URL }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
          ABORT_AFTER_CONSECUTIVE_RATE_LIMITS: ${{ github.event_name == 'workflow_dispatch' && inputs.complete_all_checks && '999' || '' }}
        run: npm run check:once -- ${{ github.event_name == 'workflow_dispatch' && inputs.all_profiles && '--all-profiles' || '' }}
